services:
  mongo:
    image: mongo:7
    container_name: centridesk-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: centridesk

  redis:
    image: redis:7-alpine
    container_name: centridesk-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  app:
    build: .
    container_name: centridesk-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - mongo
      - redis
    environment:
      DATABASE_URL: mongodb://mongo:27017/centridesk
      REDIS_URL: redis://redis:6379
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NODE_ENV: production
    volumes:
      - uploads:/app/public/uploads

volumes:
  mongo_data:
  redis_data:
  uploads:
